  <script>

// ═══════════════════════════════════════════════════════════════
// GOOGLE DRIVE INTEGRATION
// ═══════════════════════════════════════════════════════════════
const DRIVE_FILE_NAME = 'financieel_kompas_data.json';
var _gapiReady = false, _gisReady = false, _tokenClient = null, _fileId = null;
var _onDriveReady = null;

window.gapiLoaded = () => {
  gapi.load('client', async () => {
    try {
      await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
      _gapiReady = true;
      _checkReady();
    } catch(e) { console.error('GAPI init error', e); }
  });
};

window.gisLoaded = () => {
  if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID') return;
  _tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: async (resp) => {
      if (resp.error) { window._driveError && window._driveError(resp.error); return; }
      window._driveAuthenticated && window._driveAuthenticated();
    }
  });
  _gisReady = true;
  _checkReady();
};

function _checkReady() { if (_gapiReady && _gisReady && _onDriveReady) _onDriveReady(); }

async function driveSignIn() { _tokenClient && _tokenClient.requestAccessToken({ prompt: '' }); }

async function driveFindOrCreate() {
  const r = await gapi.client.drive.files.list({ q: `name='${DRIVE_FILE_NAME}' and trashed=false`, fields: 'files(id)', spaces: 'drive' });
  if (r.result.files.length > 0) { _fileId = r.result.files[0].id; return _fileId; }
  const c = await gapi.client.drive.files.create({ resource: { name: DRIVE_FILE_NAME, mimeType: 'application/json' }, fields: 'id' });
  _fileId = c.result.id;
  return _fileId;
}

// Onthoudt welke versie van het Drive-bestand wij het laatst gezien hebben.
// Zo merken we het als een ander toestel intussen heeft opgeslagen.
var _lastKnownVersion = null;
var _backupDoneFor = null;
var BACKUP_PREFIX = 'financieel_kompas_backup_';

async function _driveFetchRemote() {
  const r = await gapi.client.drive.files.get({ fileId: _fileId, alt: 'media' });
  return typeof r.result === 'object' ? r.result : JSON.parse(r.body);
}

async function _driveRemoteVersion() {
  const r = await gapi.client.drive.files.get({ fileId: _fileId, fields: 'version' });
  return r.result.version;
}

async function driveLoad() {
  const fid = await driveFindOrCreate();
  try {
    const data = await _driveFetchRemote();
    try { _lastKnownVersion = await _driveRemoteVersion(); } catch(e) {}
    return data;
  } catch(e) { return null; }
}

// ── Documentarchief ──────────────────────────────────────────────
// Bonnetjes en facturen gaan naar één zichtbare map in "Mijn Drive":
// "Financieel Kompas — Documenten" met daarin per jaar een submap.
// Op de transactie zelf bewaren we alleen het bestands-ID (klein en syncbaar).
var DOCS_FOLDER_NAME = 'Financieel Kompas \u2014 Documenten';
var _docsFolderId = null;
var _yearFolderIds = {};

async function _findOrCreateFolder(name, parentId) {
  var q = "name='" + String(name).replace(/'/g, "\\'") + "' and mimeType='application/vnd.google-apps.folder' and trashed=false";
  if (parentId) q += " and '" + parentId + "' in parents";
  var r = await gapi.client.drive.files.list({ q: q, fields: 'files(id)', spaces: 'drive' });
  if (r.result.files && r.result.files.length > 0) return r.result.files[0].id;
  var meta = { name: String(name), mimeType: 'application/vnd.google-apps.folder' };
  if (parentId) meta.parents = [parentId];
  var c = await gapi.client.drive.files.create({ resource: meta, fields: 'id' });
  return c.result.id;
}

async function _ensureYearFolder(year) {
  if (!_docsFolderId) _docsFolderId = await _findOrCreateFolder(DOCS_FOLDER_NAME, null);
  if (!_yearFolderIds[year]) _yearFolderIds[year] = await _findOrCreateFolder(String(year), _docsFolderId);
  return _yearFolderIds[year];
}

function _readFileAsBase64(file) {
  return new Promise(function(resolve, reject) {
    var r = new FileReader();
    r.onload = function() { resolve(String(r.result).split(',')[1]); };
    r.onerror = function() { reject(new Error('Bestand kon niet gelezen worden')); };
    r.readAsDataURL(file);
  });
}

async function driveUploadDocument(file, niceName, year, dossierName) {
  var folderId = dossierName ? await _ensureDossierFolder(dossierName) : await _ensureYearFolder(year);
  var base64 = await _readFileAsBase64(file);
  var boundary = '-------fk_doc_boundary_314159';
  var meta = { name: niceName, parents: [folderId] };
  var body = '--' + boundary + '\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n' +
    JSON.stringify(meta) + '\r\n--' + boundary + '\r\nContent-Type: ' + (file.type || 'application/octet-stream') +
    '\r\nContent-Transfer-Encoding: base64\r\n\r\n' + base64 + '\r\n--' + boundary + '--';
  var r = await gapi.client.request({
    path: '/upload/drive/v3/files', method: 'POST',
    params: { uploadType: 'multipart', fields: 'id,name' },
    headers: { 'Content-Type': 'multipart/related; boundary=' + boundary },
    body: body
  });
  return r.result;
}

async function driveOpenDocumentLink(fileId) {
  var r = await gapi.client.drive.files.get({ fileId: fileId, fields: 'webViewLink' });
  return r.result.webViewLink;
}

async function driveTrashDocument(fileId) {
  await gapi.client.drive.files.update({ fileId: fileId, resource: { trashed: true } });
}

// ── Dossiermappen: Documenten › Dossiers › [dossiernaam] ──
// Documenten van transacties die aan een dossier hangen, komen hier terecht.
// Verplaatsen gebeurt op basis van het bestands-ID: koppelingen blijven werken.
var DOSSIERS_SUBFOLDER = 'Dossiers';
var _dossiersRootId = null;
var _dossierFolderIds = {};

async function _ensureDossiersRoot() {
  if (!_docsFolderId) _docsFolderId = await _findOrCreateFolder(DOCS_FOLDER_NAME, null);
  if (!_dossiersRootId) _dossiersRootId = await _findOrCreateFolder(DOSSIERS_SUBFOLDER, _docsFolderId);
  return _dossiersRootId;
}

async function _ensureDossierFolder(name) {
  var key = String(name);
  var root = await _ensureDossiersRoot();
  if (!_dossierFolderIds[key]) _dossierFolderIds[key] = await _findOrCreateFolder(key, root);
  return _dossierFolderIds[key];
}

async function _findDossierFolder(name) {
  var root = await _ensureDossiersRoot();
  var q = "name='" + String(name).replace(/'/g, "\\'") + "' and mimeType='application/vnd.google-apps.folder' and trashed=false and '" + root + "' in parents";
  var r = await gapi.client.drive.files.list({ q: q, fields: 'files(id)', spaces: 'drive' });
  return (r.result.files && r.result.files.length) ? r.result.files[0].id : null;
}

async function driveMoveDocument(fileId, newParentId) {
  var r = await gapi.client.drive.files.get({ fileId: fileId, fields: 'parents' });
  var oldParents = (r.result.parents || []).join(',');
  await gapi.client.drive.files.update({ fileId: fileId, addParents: newParentId, removeParents: oldParents });
}

async function driveRenameDossierFolder(oldName, newName) {
  var id = await _findDossierFolder(oldName);
  if (!id) return false; // map bestaat (nog) niet: niets te hernoemen
  await gapi.client.drive.files.update({ fileId: id, resource: { name: String(newName) } });
  _dossierFolderIds[String(newName)] = id;
  delete _dossierFolderIds[String(oldName)];
  return true;
}

async function driveTrashDossierFolder(name) {
  var id = await _findDossierFolder(name);
  if (!id) return false;
  await gapi.client.drive.files.update({ fileId: id, resource: { trashed: true } });
  delete _dossierFolderIds[String(name)];
  return true;
}

// ── Samenvoegen van twee datasets (dit toestel + ander toestel) ──
function _mergeArraysById(localArr, remoteArr, deletedIds) {
  var seen = {}, out = [];
  (localArr || []).forEach(function(x) { if (x && x.id && deletedIds.indexOf(x.id) < 0) { seen[x.id] = true; out.push(x); } });
  (remoteArr || []).forEach(function(x) { if (x && x.id && !seen[x.id] && deletedIds.indexOf(x.id) < 0) out.push(x); });
  return out;
}
function _mergeCategoryTrees(localCats, remoteCats, dels) {
  var out = (localCats || []).map(function(ov) { return Object.assign({}, ov, { categories: (ov.categories || []).map(function(c) { return Object.assign({}, c, { items: (c.items || []).slice() }); }) }); });
  (remoteCats || []).forEach(function(rOv) {
    var lOv = out.find(function(o) { return o.id === rOv.id; });
    if (!lOv) { out.push(rOv); return; }
    (rOv.categories || []).forEach(function(rCat) {
      var lCat = (lOv.categories || []).find(function(c) { return c.id === rCat.id; });
      if (!lCat) { lOv.categories.push(rCat); return; }
      var ids = lCat.items.map(function(i) { return i.id; });
      (rCat.items || []).forEach(function(rIt) {
        if (rIt.id && ids.indexOf(rIt.id) < 0 && dels.indexOf(rIt.id) < 0) lCat.items.push(rIt);
      });
    });
  });
  return out;
}
function mergeDatasets(remote, local) {
  if (!remote || typeof remote !== 'object' || !remote.transactions) return local;
  var dels = (local.deletedIds || []).concat(remote.deletedIds || []).filter(function(x, i, a) { return a.indexOf(x) === i; });
  var catDels = (local.categoryDeletions || []).concat(remote.categoryDeletions || []).filter(function(x, i, a) { return a.indexOf(x) === i; });
  var merged = Object.assign({}, remote, local);
  ['transactions', 'balances', 'accounts', 'goals', 'budgets', 'recurring', 'loanPlans', 'dossiers', 'dossierEntries', 'dossierSettlements'].forEach(function(k) {
    merged[k] = _mergeArraysById(local[k], remote[k], dels);
  });
  merged.categories = _mergeCategoryTrees(local.categories, remote.categories, catDels);
  merged.categoryOverrides = Object.assign({}, remote.categoryOverrides || {}, local.categoryOverrides || {});
  merged.categoryDeletions = catDels;
  merged.deletedIds = dels.slice(-1000);
  return merged;
}

// ── Dagelijkse reservekopie: bij de eerste opslag van de dag bewaren we
//    eerst de bestaande Drive-inhoud als gedateerd bestand (max. 14 stuks) ──
async function driveEnsureDailyBackup() {
  var todayStr = new Date().toISOString().slice(0, 10);
  if (_backupDoneFor === todayStr) return;
  try {
    var r = await gapi.client.drive.files.list({ q: "name contains '" + BACKUP_PREFIX + "' and trashed=false", fields: 'files(id,name)', spaces: 'drive', pageSize: 100 });
    var files = (r.result.files || []).filter(function(f) { return f.name.indexOf(BACKUP_PREFIX) === 0; });
    var todayName = BACKUP_PREFIX + todayStr + '.json';
    if (!files.find(function(f) { return f.name === todayName; })) {
      var current = null;
      try { current = await _driveFetchRemote(); } catch(e) {}
      if (current && current.transactions) {
        var c = await gapi.client.drive.files.create({ resource: { name: todayName, mimeType: 'application/json' }, fields: 'id' });
        await gapi.client.request({ path: '/upload/drive/v3/files/' + c.result.id, method: 'PATCH', params: { uploadType: 'media' }, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(current) });
        files.push({ id: c.result.id, name: todayName });
      }
    }
    _backupDoneFor = todayStr;
    files.sort(function(a, b) { return a.name < b.name ? 1 : -1; });
    for (var i = 14; i < files.length; i++) {
      try { await gapi.client.drive.files.delete({ fileId: files[i].id }); } catch(e) {}
    }
  } catch(e) { console.error('Backup:', e); }
}

async function driveListBackups() {
  var r = await gapi.client.drive.files.list({ q: "name contains '" + BACKUP_PREFIX + "' and trashed=false", fields: 'files(id,name)', spaces: 'drive', pageSize: 100 });
  return (r.result.files || []).filter(function(f) { return f.name.indexOf(BACKUP_PREFIX) === 0; }).sort(function(a, b) { return a.name < b.name ? 1 : -1; });
}
async function driveLoadBackup(fileId) {
  var r = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
  return typeof r.result === 'object' ? r.result : JSON.parse(r.body);
}

// Herstellen uit een reservekopie: bewust volledig overschrijven (geen samenvoeging)
async function driveRestoreOverwrite(data) {
  if (!_fileId) await driveFindOrCreate();
  var resp = await gapi.client.request({ path: `/upload/drive/v3/files/${_fileId}`, method: 'PATCH', params: { uploadType: 'media', fields: 'version' }, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
  try { _lastKnownVersion = resp.result && resp.result.version ? resp.result.version : await _driveRemoteVersion(); } catch(e) {}
}

async function driveSignOut() {
  try {
    var token = (gapi && gapi.client && gapi.client.getToken) ? gapi.client.getToken() : null;
    if (token && token.access_token && window.google && google.accounts && google.accounts.oauth2) {
      google.accounts.oauth2.revoke(token.access_token, function() {});
    }
    if (gapi && gapi.client && gapi.client.setToken) gapi.client.setToken(null);
  } catch (e) {}
  window._driveConnected = false;
  window._driveEmail = null;
  _fileId = null;
  _lastKnownVersion = null;
  location.reload();
}

async function driveSave(data) {
  if (!_fileId) await driveFindOrCreate();
  await driveEnsureDailyBackup();
  var toSave = data;
  // Conflictcontrole: heeft een ander toestel intussen opgeslagen?
  try {
    var remoteVersion = await _driveRemoteVersion();
    if (_lastKnownVersion !== null && String(remoteVersion) !== String(_lastKnownVersion)) {
      var remote = await _driveFetchRemote();
      toSave = mergeDatasets(remote, data);
      if (window._onRemoteMerge) window._onRemoteMerge(toSave);
    }
  } catch(e) {}
  var resp = await gapi.client.request({ path: `/upload/drive/v3/files/${_fileId}`, method: 'PATCH', params: { uploadType: 'media', fields: 'version' }, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(toSave) });
  try { _lastKnownVersion = resp.result && resp.result.version ? resp.result.version : await _driveRemoteVersion(); } catch(e) {}
  return toSave;
}

  <script>
var _LR=window.LucideReact||window.lucideReact||window.LucideIcons||{};
// Als de icoonbibliotheek niet (op tijd) laadt, tonen we een leesbaar tekstteken
// in plaats van een lege vorm — zo blijft bv. de "+"-knop altijd zichtbaar.

// itemSearchTerms: bouwt de volledige zoektekst voor één subcategorie in de huidige taal —
// vertaalde naam + originele naam + vertaalde synoniemen (indien aanwezig) + de originele
// Nederlandse synoniemen (die blijven altijd mee, want merknamen daarin werken toch al in elke taal).
function itemSearchTerms(it) {
  var terms = [itemName(it.name), it.name];
  var extra = SYNONYM_TRANSLATIONS[it.name];
  if (extra && extra[CURRENT_LANG]) terms = terms.concat(extra[CURRENT_LANG]);
  if (it.synonyms) terms = terms.concat(it.synonyms);
  return terms.join(' | ').toLowerCase();
}
