// ═══════════════════════════════════════════════════════════════
// GOOGLE DRIVE INTEGRATION
// ═══════════════════════════════════════════════════════════════
const DRIVE_FILE_NAME = 'financieel_kompas_data.json';
let _gapiReady = false, _gisReady = false, _tokenClient = null, _fileId = null;
let _onDriveReady = null;

window.gapiLoaded = () => {
  gapi.load('client', async () => {
    try {
      await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
      _gapiReady = true;
      _checkReady();
    } catch(e) { console.error('GAPI init error', e); }
  });
};

window.gisLoaded = () => {
  if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID') return;
  _tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: async (resp) => {
      if (resp.error) { window._driveError && window._driveError(resp.error); return; }
      window._driveAuthenticated && window._driveAuthenticated();
    }
  });
  _gisReady = true;
  _checkReady();
};

function _checkReady() { if (_gapiReady && _gisReady && _onDriveReady) _onDriveReady(); }

async function driveSignIn() { _tokenClient && _tokenClient.requestAccessToken({ prompt: '' }); }

async function driveFindOrCreate() {
  const r = await gapi.client.drive.files.list({ q: `name='${DRIVE_FILE_NAME}' and trashed=false`, fields: 'files(id)', spaces: 'drive' });
  if (r.result.files.length > 0) { _fileId = r.result.files[0].id; return _fileId; }
  const c = await gapi.client.drive.files.create({ resource: { name: DRIVE_FILE_NAME, mimeType: 'application/json' }, fields: 'id' });
  _fileId = c.result.id;
  return _fileId;
}

async function driveLoad() {
  const fid = await driveFindOrCreate();
  try {
    const r = await gapi.client.drive.files.get({ fileId: fid, alt: 'media' });
    return typeof r.result === 'object' ? r.result : JSON.parse(r.body);
  } catch(e) { return null; }
}

async function driveSave(data) {
  if (!_fileId) await driveFindOrCreate();
  await gapi.client.request({ path: `/upload/drive/v3/files/${_fileId}`, method: 'PATCH', params: { uploadType: 'media' }, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
}

const TxForm = ({data,initial,onSave,onClose,title="Nieuwe transactie"}) => {
  const blank = {date:fmt(today),description:"",amount:"",type:"expense",hoofdtype:"Variabele Uitgaven",overkoepelend:"",category:"",itemName:"",itemId:"",accountId:data.accounts[0]?.id||"",brand:"",quantity:"",unit:"",notes:"",isPromo:false,grossPrice:""};
  const [form,setForm] = useState(initial||blank);
  const [search,setSearch] = useState(initial?.itemName||"");
  const [showRes,setShowRes] = useState(false);
  const [showOpt,setShowOpt] = useState(!!(initial?.brand||initial?.quantity||initial?.isPromo));
  const searchRef = useRef(null);
  const flatItems = useMemo(()=>buildFlatItems(data.categories),[data.categories]);

  useEffect(()=>{ const h=e=>{if(searchRef.current&&!searchRef.current.contains(e.target))setShowRes(false);}; document.addEventListener("mousedown",h); return()=>document.removeEventListener("mousedown",h); },[]);

  const typeConfig = { income:{label:"Inkomst",hoofdtype:"Inkomsten",color:T.green,icon:"📈"}, expense:{label:"Uitgave",hoofdtype:"Variabele Uitgaven",color:T.red,icon:"💸"}, fixed:{label:"Vaste last",hoofdtype:"Vaste Uitgaven",color:T.purple,icon:"🏠"}, saving:{label:"Sparen",hoofdtype:"Sparen",color:T.blue,icon:"💰"} };

  const results = useMemo(()=>{ if(!search||search.length<2)return []; const q=search.toLowerCase(); return flatItems.filter(it=>{ if(form.type!=="income"&&it.hoofdtype==="Inkomsten")return false; if(form.type==="income"&&it.hoofdtype!=="Inkomsten")return false; return it.name.toLowerCase().includes(q)||(it.synonyms||[]).some(s=>s.toLowerCase().includes(q))||it.category.toLowerCase().includes(q)||it.overkoepelend.toLowerCase().includes(q); }).slice(0,8); },[search,flatItems,form.type]);

  const selectItem = (it) => { setForm(f=>({...f,itemId:it.id,itemName:it.name,category:it.category,overkoepelend:it.overkoepelend,hoofdtype:it.hoofdtype,unit:f.unit||it.unit||""})); setSearch(it.name); setShowRes(false); };

  const handleTypeChange = (t) => { setForm(f=>({...f,type:t,hoofdtype:typeConfig[t].hoofdtype,itemId:"",itemName:"",category:"",overkoepelend:""})); setSearch(""); };

  const handleSubmit = () => {
    if(!form.date||!form.amount||!form.description)return;
    onSave({...form,id:initial?.id||generateId(),amount:parseFloat(form.amount),quantity:form.quantity?parseFloat(form.quantity):undefined,grossPrice:form.grossPrice?parseFloat(form.grossPrice):undefined});
    onClose();
  };

  return <Modal title={title} onClose={onClose}>
    <div className="grid grid-cols-4 gap-2 mb-5">{Object.entries(typeConfig).map(([key,cfg])=>(
      <button key={key} onClick={()=>handleTypeChange(key)} className="flex flex-col items-center gap-1 py-2.5 rounded-xl text-xs font-medium border-2 transition-all" style={{borderColor:form.type===key?cfg.color:"#e2e8f0",backgroundColor:form.type===key?cfg.color+"15":"white",color:form.type===key?cfg.color:"#64748b"}}>
        <span className="text-base">{cfg.icon}</span>{cfg.label}
      </button>
    ))}</div>
    <div className="grid grid-cols-2 gap-4">
      <FormField label="Datum"><Input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></FormField>
      <FormField label="Bedrag (€)" hint="Altijd positief"><Input type="number" step="0.01" min="0" placeholder="0,00" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></FormField>
    </div>
    <FormField label="Beschrijving"><Input placeholder="Bv. Colruyt boodschappen" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/></FormField>
    <FormField label="Categorie" hint="Zoek op naam of synoniem — bv. 'brood', 'tanken', 'netflix'">
      <div className="relative" ref={searchRef}>
        <div className="relative"><Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
          <Input className="pl-8" placeholder="Typ om te zoeken..." value={search} onChange={e=>{setSearch(e.target.value);setShowRes(true);if(!e.target.value)setForm(f=>({...f,itemId:"",itemName:"",category:"",overkoepelend:""}));}} onFocus={()=>setShowRes(true)}/>
        </div>
        {showRes&&results.length>0&&<div className="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg overflow-hidden">
          {results.map(it=><button key={it.id} onClick={()=>selectItem(it)} className="w-full text-left px-4 py-2.5 hover:bg-slate-50 flex items-center justify-between group border-b border-slate-50 last:border-0">
            <div><div className="text-sm font-medium text-slate-800">{it.name}</div><div className="text-xs text-slate-400">{it.overkoepelend} › {it.category}</div></div>
            <div className="flex items-center gap-2 opacity-0 group-hover:opacity-100">{it.unit&&<span className="text-xs bg-slate-100 px-2 py-0.5 rounded-full">{it.unit}</span>}<Badge color={it.color}>{it.hoofdtype.replace(" Uitgaven","")}</Badge></div>
          </button>)}

      <div className="grid grid-cols-3 gap-3">
        <FormField label="Merk"><Input placeholder="Colruyt" value={form.brand} onChange={e=>setForm(f=>({...f,brand:e.target.value}))}/></FormField>
        <FormField label="Hoeveelheid"><Input type="number" step="any" min="0" placeholder="1" value={form.quantity} onChange={e=>setForm(f=>({...f,quantity:e.target.value}))}/></FormField>
        <FormField label="Eenheid"><Sel value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))}><option value="">—</option>{["stuks","g","kg","ml","L","kWh","m³","m","m²","verpakking"].map(u=><option key={u} value={u}>{u}</option>)}</Sel></FormField>
      </div>
      <div className="flex items-center gap-3"><input type="checkbox" id="promo" checked={form.isPromo} onChange={e=>setForm(f=>({...f,isPromo:e.target.checked}))} className="rounded"/><label htmlFor="promo" className="text-sm text-slate-700">In promotie</label></div>
      {form.isPromo&&<FormField label="Normale prijs (excl. promo)"><Input type="number" step="0.01" min="0" placeholder="0,00" value={form.grossPrice} onChange={e=>setForm(f=>({...f,grossPrice:e.target.value}))}/></FormField>}
      <FormField label="Notities"><Input placeholder="Toelichting" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></FormField>
    </div>}
    <div className="flex gap-3 justify-end"><Btn variant="secondary" onClick={onClose}>Annuleren</Btn><Btn onClick={handleSubmit} disabled={!form.date||!form.amount||!form.description}><Check size={14}/>Opslaan</Btn></div>
  </Modal>;
};

// ═══════════ DASHBOARD ════════════
const Dashboard = ({data,onQuickAdd,profile}) => {
  const txs = data.transactions;
  const thisMonth = txs.filter(t=>getMonth(t.date)===currentMonth);
  const income = thisMonth.filter(t=>!isExpense(t)).reduce((s,t)=>s+t.amount,0);
  const expenses = thisMonth.filter(t=>isExpense(t)&&t.hoofdtype!=="Sparen").reduce((s,t)=>s+t.amount,0);
  const savings = thisMonth.filter(t=>t.hoofdtype==="Sparen").reduce((s,t)=>s+t.amount,0);
  const spaarquote = income>0?Math.round(savings/income*100):0;

  const latestByAcc = useMemo(()=>{ const m={}; data.balances.forEach(b=>{if(!m[b.accountId]||b.date>m[b.accountId].date)m[b.accountId]=b;}); return m; },[data.balances]);
  const totalAssets = Object.values(latestByAcc).filter(b=>b.amount>0).reduce((s,b)=>s+b.amount,0);
  const totalDebts = Math.abs(Object.values(latestByAcc).filter(b=>b.amount<0).reduce((s,b)=>s+b.amount,0));
  const netWorth = totalAssets-totalDebts;

  // Real 6-month chart data from transactions
  const chartData = useMemo(()=>Array.from({length:6},(_,i)=>{
    const d=new Date(today); d.setMonth(d.getMonth()-5+i);
    const m=fmt(d).slice(0,7);
    const mtx=txs.filter(t=>getMonth(t.date)===m);
    return { name:d.toLocaleDateString("nl-BE",{month:"short"}), Inkomsten:mtx.filter(t=>!isExpense(t)).reduce((s,t)=>s+t.amount,0), Uitgaven:mtx.filter(t=>isExpense(t)&&t.hoofdtype!=="Sparen").reduce((s,t)=>s+t.amount,0) };
  }),[txs]);

  // Real pie data from this month
  const pieData = useMemo(()=>{ const m={}; thisMonth.filter(t=>isExpense(t)&&t.hoofdtype!=="Sparen").forEach(t=>{m[t.overkoepelend]=(m[t.overkoepelend]||0)+t.amount;}); return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([name,value])=>({name,value,color:OV_COLORS[name]||"#94a3b8"})); },[thisMonth]);

  // Goals with real balance
  const goalsForDash = useMemo(()=>data.goals.map(g=>{ const acc=g.linkedAccountId?latestByAcc[g.linkedAccountId]:null; const current=acc?Math.abs(acc.amount):0; return {...g,current,pct:Math.min(100,g.targetAmount>0?current/g.targetAmount*100:0)}; }),[data.goals,latestByAcc]);

  // Budget alerts
  const budgetAlerts = useMemo(()=>data.budgets.map(b=>{ const spent=thisMonth.filter(t=>isExpense(t)&&t.overkoepelend===b.overkoepelend).reduce((s,t)=>s+t.amount,0); return {...b,spent,pct:b.amount>0?spent/b.amount*100:0}; }).filter(b=>b.pct>85).sort((a,z)=>z.pct-a.pct),[data.budgets,thisMonth]);

  const recentTxs = useMemo(()=>[...txs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5),[txs]);
  const firstName = profile?.firstName||"";

  return <div className="p-6 max-w-7xl mx-auto">
    <div className="flex items-center justify-between mb-6">
      <div><h1 className="text-2xl font-bold text-slate-800">{getGreeting()}{firstName?`, ${firstName}`:""} 👋</h1><p className="text-slate-500 text-sm mt-0.5">{today.toLocaleDateString("nl-BE",{weekday:"long",day:"numeric",month:"long"})}</p></div>
      <Btn onClick={onQuickAdd} size="md"><Plus size={16}/>Transactie</Btn>
    </div>

    {/* Budget alerts */}
    {budgetAlerts.length>0&&<div className="mb-5 p-4 rounded-xl border border-amber-200 bg-amber-50 flex items-start gap-3">
      <AlertCircle size={18} className="text-amber-600 mt-0.5 flex-shrink-0"/>
      <div><div className="text-sm font-semibold text-amber-800 mb-1">Budgetwaarschuwing</div>
      <div className="text-xs text-amber-700 space-y-0.5">{budgetAlerts.map(b=><div key={b.id}>{b.overkoepelend}: {fmtEUR(b.spent)} van {fmtEUR(b.amount)} ({b.pct.toFixed(0)}%){b.pct>=100?" — OVER BUDGET":""}</div>)}</div></div>
    </div>}

    {/* KPI Cards */}
    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">{[
      {label:"Netto Vermogen",value:fmtEUR(netWorth),sub:`Schulden: ${fmtEUR(totalDebts)}`,icon:"💎",accent:T.teal,bg:"#f0fdfa"},
      {label:"Inkomsten (maand)",value:fmtEUR(income),sub:"Deze maand",icon:"📈",accent:T.green,bg:"#ecfdf5"},
      {label:"Uitgaven (maand)",value:fmtEUR(expenses),sub:"Excl. sparen",icon:"📉",accent:T.red,bg:"#fef2f2"},
      {label:"Spaarquote",value:`${spaarquote}%`,sub:`${fmtEUR(savings)} gespaard`,icon:"🎯",accent:T.blue,bg:"#eff6ff"},
    ].map((k,i)=><Card key={i} className="p-4 border-l-4" style={{borderLeftColor:k.accent}}>
      <div className="flex items-center justify-between mb-2"><span className="text-xs font-medium text-slate-500 uppercase tracking-wide">{k.label}</span><span className="text-xl">{k.icon}</span></div>
      <div className="text-xl font-bold text-slate-800 mb-1">{k.value}</div>
      <div className="text-xs text-slate-400">{k.sub}</div>
    </Card>)}</div>

    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
      <Card className="lg:col-span-2 p-5">
        <div className="flex items-center justify-between mb-4"><h2 className="font-semibold text-slate-800">Inkomsten vs Uitgaven</h2><span className="text-xs text-slate-400 bg-slate-50 px-2 py-1 rounded-full">Laatste 6 maanden</span></div>
        <ResponsiveContainer width="100%" height={180}><BarChart data={chartData} barGap={4}>
          <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" vertical={false}/>
          <XAxis dataKey="name" tick={{fontSize:11,fill:"#94a3b8"}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fontSize:11,fill:"#94a3b8"}} axisLine={false} tickLine={false} tickFormatter={v=>v?`€${(v/1000).toFixed(1)}k`:""}/> 
          <Tooltip formatter={(v,n)=>[fmtEUR(v),n]} contentStyle={{borderRadius:12,border:"1px solid #e2e8f0"}}/>
          <Bar dataKey="Inkomsten" fill={T.teal} radius={[6,6,0,0]}/>
          <Bar dataKey="Uitgaven" fill="#fca5a5" radius={[6,6,0,0]}/>
        </BarChart></ResponsiveContainer>
      </Card>
      <Card className="p-5">
        <h2 className="font-semibold text-slate-800 mb-4">Uitgaven per categorie</h2>
        {pieData.length>0?<><ResponsiveContainer width="100%" height={140}><PieChart><Pie data={pieData} cx="50%" cy="50%" innerRadius={38} outerRadius={62} paddingAngle={3} dataKey="value">{pieData.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Tooltip formatter={v=>[fmtEUR(v)]} contentStyle={{borderRadius:12,border:"1px solid #e2e8f0"}}/></PieChart></ResponsiveContainer>
        <div className="space-y-1.5 mt-2">{pieData.map((e,i)=><div key={i} className="flex items-center justify-between"><div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full flex-shrink-0" style={{backgroundColor:e.color}}/><span className="text-xs text-slate-600 truncate max-w-24">{e.name}</span></div><span className="text-xs font-medium text-slate-700">{fmtEUR(e.value)}</span></div>)}</div></>
        :<div className="py-8 text-center text-slate-400 text-sm">Nog geen uitgaven deze maand</div>}
      </Card>
    </div>

    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <Card className="p-5">
        <h2 className="font-semibold text-slate-800 mb-4">Recente transacties</h2>
        {recentTxs.length>0?<div className="space-y-3">{recentTxs.map(t=><div key={t.id} className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-xl flex items-center justify-center text-sm flex-shrink-0" style={{backgroundColor:isExpense(t)?T.redBg:T.greenBg}}>{isExpense(t)?"💸":"💰"}</div>
          <div className="flex-1 min-w-0"><div className="text-sm font-medium text-slate-800 truncate">{t.description}</div><div className="text-xs text-slate-400">{t.category||t.overkoepelend||"—"} · {fmtDateShort(t.date)}</div></div>
          <div className={`text-sm font-semibold flex-shrink-0 ${isExpense(t)?"text-red-500":"text-emerald-600"}`}>{isExpense(t)?"-":"+"}{fmtEUR(t.amount)}</div>
        </div>)}</div>:<div className="py-8 text-center text-slate-400 text-sm">Nog geen transacties</div>}
      </Card>
      <Card className="p-5">
        <h2 className="font-semibold text-slate-800 mb-4">Spaardoelen</h2>
        {goalsForDash.length>0?<div className="space-y-4">{goalsForDash.slice(0,4).map(g=><div key={g.id}>
          <div className="flex items-center justify-between mb-1"><span className="text-sm font-medium text-slate-700">{g.name}</span><span className="text-xs font-bold" style={{color:g.pct>=100?T.green:g.color}}>{g.pct.toFixed(0)}%</span></div>
          <Progress value={g.current} max={g.targetAmount} color={g.color}/>
          <div className="flex justify-between mt-1"><span className="text-xs text-slate-400">{fmtEUR(g.current)}</span><span className="text-xs text-slate-400">{fmtEUR(g.targetAmount)}</span></div>
        </div>)}</div>:<div className="py-8 text-center text-slate-400 text-sm">Nog geen spaardoelen</div>}
      </Card>
    </div>
  </div>;
};

// ═══════════ TRANSACTIES ════════════
const TransactiesPage = ({data,onAdd,onUpdate,onDelete,toast}) => {
  const [search,setSearch] = useState("");
  const [filter,setFilter] = useState("all");
  const [monthFilter,setMonthFilter] = useState(currentMonth);
  const [showForm,setShowForm] = useState(false);
  const [editTx,setEditTx] = useState(null);
  const [confirmDel,setConfirmDel] = useState(null);

  const months = useMemo(()=>[...new Set(data.transactions.map(t=>getMonth(t.date)))].sort().reverse(),[data.transactions]);

  const filtered = useMemo(()=>[...data.transactions].sort((a,b)=>b.date.localeCompare(a.date)).filter(t=>{
    if(monthFilter&&getMonth(t.date)!==monthFilter)return false;
    if(filter==="income"&&isExpense(t))return false;
    if(filter==="expense"&&!isExpense(t))return false;
    if(search){const q=search.toLowerCase();return t.description.toLowerCase().includes(q)||(t.category||"").toLowerCase().includes(q)||(t.overkoepelend||"").toLowerCase().includes(q)||(t.brand||"").toLowerCase().includes(q);}
    return true;
  }),[data.transactions,filter,search,monthFilter]);

  const accMap = useMemo(()=>Object.fromEntries(data.accounts.map(a=>[a.id,a])),[data.accounts]);
  const totalIn = filtered.filter(t=>!isExpense(t)).reduce((s,t)=>s+t.amount,0);
  const totalOut = filtered.filter(t=>isExpense(t)).reduce((s,t)=>s+t.amount,0);

  return <div className="p-6 max-w-5xl mx-auto">
    <div className="flex items-center justify-between mb-6">
      <h1 className="text-2xl font-bold text-slate-800">Transacties</h1>
      <Btn onClick={()=>setShowForm(true)} size="md"><Plus size={16}/>Toevoegen</Btn>
    </div>
    <div className="grid grid-cols-3 gap-4 mb-4">
      <Card className="p-3 border-l-4" style={{borderLeftColor:T.green}}><div className="text-xs text-slate-500 mb-1">Inkomsten</div><div className="font-bold text-emerald-600">{fmtEUR(totalIn)}</div></Card>
      <Card className="p-3 border-l-4" style={{borderLeftColor:T.red}}><div className="text-xs text-slate-500 mb-1">Uitgaven</div><div className="font-bold text-red-500">{fmtEUR(totalOut)}</div></Card>
      <Card className="p-3 border-l-4" style={{borderLeftColor:T.teal}}><div className="text-xs text-slate-500 mb-1">Saldo</div><div className={`font-bold ${totalIn-totalOut>=0?"text-emerald-600":"text-red-500"}`}>{fmtEUR(totalIn-totalOut)}</div></Card>
    </div>
    <Card className="mb-4 p-4">
      <div className="flex flex-col sm:flex-row gap-3">
        <div className="relative flex-1"><Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/><Input className="pl-8" placeholder="Zoeken..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <Sel value={monthFilter} onChange={e=>setMonthFilter(e.target.value)} className="w-36">
          <option value="">Alle maanden</option>
          {months.map(m=><option key={m} value={m}>{new Date(m+"-01").toLocaleDateString("nl-BE",{month:"long",year:"numeric"})}</option>)}
        </Sel>
        <div className="flex gap-2">{[["all","Alle"],["income","Inkomsten"],["expense","Uitgaven"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)} className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${filter===k?"bg-teal-600 text-white":"bg-slate-100 text-slate-600 hover:bg-slate-200"}`}>{l}</button>
        ))}</div>
      </div>
    </Card>
    <Card>
      <div className="divide-y divide-slate-50">
        {filtered.length===0&&<div className="py-12 text-center text-slate-400 text-sm">Geen transacties gevonden</div>}
        {filtered.map(t=>{ const acc=accMap[t.accountId]; return (
          <div key={t.id} className="flex items-center gap-4 px-5 py-3.5 hover:bg-slate-50/70 group transition-colors">
            <div className="text-xs text-slate-400 w-14 flex-shrink-0 font-mono">{fmtDateShort(t.date)}</div>
            <div className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{backgroundColor:OV_COLORS[t.overkoepelend]||"#cbd5e1"}}/>
            <div className="flex-1 min-w-0">
              <div className="font-medium text-slate-800 text-sm truncate">{t.description}{t.brand&&<span className="text-slate-400 font-normal ml-1">· {t.brand}</span>}</div>
              <div className="text-xs text-slate-400 flex items-center gap-1 mt-0.5"><span>{t.overkoepelend||"—"}</span>{t.category&&<><ChevronRight size={10}/><span>{t.category}</span></>}</div>
            </div>
            {acc&&<Badge color={acc.color} small>{acc.name}</Badge>}
            <div className={`text-sm font-semibold flex-shrink-0 ${isExpense(t)?"text-red-500":"text-emerald-600"}`}>{isExpense(t)?"-":"+"}{fmtEUR(t.amount)}</div>
            <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-all">
              <button onClick={()=>setEditTx(t)} className="p-1.5 rounded-lg text-slate-300 hover:text-teal-600 hover:bg-teal-50"><Pencil size={13}/></button>
              {confirmDel===t.id
                ?<div className="flex items-center gap-1"><button onClick={()=>{onDelete(t.id);setConfirmDel(null);toast("Transactie verwijderd");}} className="px-2 py-1 bg-red-600 text-white text-xs rounded-lg">Ja</button><button onClick={()=>setConfirmDel(null)} className="px-2 py-1 bg-slate-100 text-slate-600 text-xs rounded-lg">Nee</button></div>
                :<button onClick={()=>setConfirmDel(t.id)} className="p-1.5 rounded-lg text-slate-300 hover:text-red-500 hover:bg-red-50"><Trash2 size={13}/></button>
              }
            </div>
          </div>
        );})}
      </div>
    </Card>
    {showForm&&<TxForm data={data} onSave={tx=>{onAdd(tx);toast("Transactie opgeslagen ✓");}} onClose={()=>setShowForm(false)}/>}
    {editTx&&<TxForm data={data} initial={{...editTx,type:editTx.hoofdtype==="Inkomsten"?"income":editTx.hoofdtype==="Sparen"?"saving":editTx.hoofdtype==="Vaste Uitgaven"?"fixed":"expense"}} title="Transactie bewerken" onSave={tx=>{onUpdate(tx);toast("Transactie bijgewerkt ✓");}} onClose={()=>setEditTx(null)}/>}
  </div>;
};

// ═══════════ REKENINGEN ════════════
const RekeningenPage = ({data,onUpdate,toast}) => {
  const [showBal,setShowBal] = useState(null);
  const [showAcc,setShowAcc] = useState(false);
  const [balForm,setBalForm] = useState({date:fmt(today),amount:"",notes:""});
  const [accForm,setAccForm] = useState({name:"",type:"checking",institution:"",iban:"",color:T.teal});
  const TYPES = {checking:"Zichtrekening",savings:"Spaarrekening",loan:"Lening/Krediet",investment:"Beleggingen",asset:"Activa / Bezitting"};

  const latestByAcc = useMemo(()=>{ const m={}; data.balances.forEach(b=>{if(!m[b.accountId]||b.date>m[b.accountId].date)m[b.accountId]=b;}); return m; },[data.balances]);
  const totalAssets = Object.values(latestByAcc).filter(b=>b.amount>0).reduce((s,b)=>s+b.amount,0);
  const totalDebts = Math.abs(Object.values(latestByAcc).filter(b=>b.amount<0).reduce((s,b)=>s+b.amount,0));

  const addBal = ()=>{ if(!balForm.amount)return; const b={id:generateId(),accountId:showBal,date:balForm.date,amount:parseFloat(balForm.amount),notes:balForm.notes}; onUpdate(d=>({...d,balances:[...d.balances,b]})); setShowBal(null); setBalForm({date:fmt(today),amount:"",notes:""}); toast("Saldo bijgewerkt ✓"); };
  const addAcc = ()=>{ if(!accForm.name)return; onUpdate(d=>({...d,accounts:[...d.accounts,{id:generateId(),...accForm,active:true}]})); setShowAcc(false); setAccForm({name:"",type:"checking",institution:"",iban:"",color:T.teal}); toast("Rekening toegevoegd ✓"); };

  return <div className="p-6 max-w-5xl mx-auto">
    <div className="flex items-center justify-between mb-6"><h1 className="text-2xl font-bold text-slate-800">Rekeningen & Vermogen</h1><Btn onClick={()=>setShowAcc(true)} size="md"><Plus size={16}/>Rekening</Btn></div>
    <div className="grid grid-cols-3 gap-4 mb-6">{[
      {label:"Bezittingen",val:fmtEUR(totalAssets),color:T.green,icon:"📈"},
      {label:"Schulden",val:fmtEUR(totalDebts),color:T.red,icon:"📉"},
      {label:"Netto vermogen",val:fmtEUR(totalAssets-totalDebts),color:T.teal,icon:"💎"},
    ].map((k,i)=><Card key={i} className="p-4 border-l-4" style={{borderLeftColor:k.color}}><div className="text-xs text-slate-500 mb-1 flex items-center gap-1"><span>{k.icon}</span>{k.label}</div><div className="text-xl font-bold" style={{color:k.color}}>{k.val}</div></Card>)}</div>
    <div className="grid gap-3">{data.accounts.map(acc=>{ const latest=latestByAcc[acc.id]; const bal=latest?.amount??null; const isDebt=bal!==null&&bal<0;
      return <Card key={acc.id} className="p-5"><div className="flex items-center gap-4">
        <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl flex-shrink-0" style={{backgroundColor:acc.color+"22"}}>{acc.type==="savings"?"💰":acc.type==="loan"?"📋":acc.type==="investment"?"📊":"🏦"}</div>
        <div className="flex-1 min-w-0"><div className="font-semibold text-slate-800">{acc.name}</div><div className="text-xs text-slate-400">{TYPES[acc.type]}{acc.institution&&` · ${acc.institution}`}{acc.iban&&` · ${acc.iban}`}</div></div>
        <div className="text-right"><div className={`text-xl font-bold ${bal===null?"text-slate-300":isDebt?"text-red-500":"text-slate-800"}`}>{bal===null?"—":fmtEUR(bal)}</div>{latest&&<div className="text-xs text-slate-400">Bijgewerkt {fmtDateShort(latest.date)}</div>}</div>
        <Btn size="xs" variant="secondary" onClick={()=>{setShowBal(acc.id);setBalForm({date:fmt(today),amount:bal??0,notes:""});}}>Saldo bijwerken</Btn>
      </div></Card>;
    })}</div>
    {showBal&&<Modal title="Saldo bijwerken" onClose={()=>setShowBal(null)}>
      <div className="mb-4 p-3 rounded-xl text-sm" style={{backgroundColor:T.tealBg,color:T.teal}}><Info size={14} className="inline mr-1.5"/>Voer de actuele stand in. Negatief voor schulden.</div>
      <FormField label="Datum"><Input type="date" value={balForm.date} onChange={e=>setBalForm(f=>({...f,date:e.target.value}))}/></FormField>
      <FormField label="Huidig saldo (€)" hint="Negatief voor schulden (bv. -6200)"><Input type="number" step="0.01" placeholder="0,00" value={balForm.amount} onChange={e=>setBalForm(f=>({...f,amount:e.target.value}))}/></FormField>
      <FormField label="Notities"><Input placeholder="Optioneel" value={balForm.notes} onChange={e=>setBalForm(f=>({...f,notes:e.target.value}))}/></FormField>
      <div className="flex gap-3 justify-end mt-2"><Btn variant="secondary" onClick={()=>setShowBal(null)}>Annuleren</Btn><Btn onClick={addBal} disabled={!balForm.amount}><Check size={14}/>Opslaan</Btn></div>
    </Modal>}
    {showAcc&&<Modal title="Rekening / Activa toevoegen" onClose={()=>setShowAcc(false)}>
      <FormField label="Naam"><Input placeholder="Bv. ING Spaarrekening" value={accForm.name} onChange={e=>setAccForm(f=>({...f,name:e.target.value}))}/></FormField>
      <FormField label="Type"><Sel value={accForm.type} onChange={e=>setAccForm(f=>({...f,type:e.target.value}))}>{Object.entries(TYPES).map(([k,v])=><option key={k} value={k}>{v}</option>)}</Sel></FormField>

const SpaardoelenPage = ({data,onUpdate,toast}) => {
  const [showForm,setShowForm] = useState(false);
  const [editGoal,setEditGoal] = useState(null);
  const [quickUpdate,setQuickUpdate] = useState(null);
  const [qAmt,setQAmt] = useState("");
  const COLORS = [T.teal,T.blue,T.amber,T.red,T.green,T.purple,"#d97706","#db2777"];

  const latestByAcc = useMemo(()=>{ const m={}; data.balances.forEach(b=>{if(!m[b.accountId]||b.date>m[b.accountId].date)m[b.accountId]=b;}); return m; },[data.balances]);

  const goalsWithProgress = useMemo(()=>data.goals.map(g=>{ const acc=g.linkedAccountId?latestByAcc[g.linkedAccountId]:null; const current=acc?Math.abs(acc.amount):g.currentAmount||0; const pct=Math.min(100,g.targetAmount>0?current/g.targetAmount*100:0); const remaining=Math.max(0,g.targetAmount-current); const monthsLeft=g.monthlyTarget>0?Math.ceil(remaining/g.monthlyTarget):null; return {...g,current,pct,remaining,monthsLeft}; }),[data.goals,latestByAcc]);

  const [form,setForm] = useState({name:"",targetAmount:"",targetDate:"",linkedAccountId:"",monthlyTarget:"",color:T.teal,notes:""});
  const saveGoal = (g) => { if(!g.name||!g.targetAmount)return; if(g.id){onUpdate(d=>({...d,goals:d.goals.map(x=>x.id===g.id?{...x,...g,targetAmount:parseFloat(g.targetAmount),monthlyTarget:parseFloat(g.monthlyTarget)||0}:x)}));toast("Doel bijgewerkt ✓");}else{onUpdate(d=>({...d,goals:[...d.goals,{id:generateId(),...g,targetAmount:parseFloat(g.targetAmount),monthlyTarget:parseFloat(g.monthlyTarget)||0,currentAmount:0}]}));toast("Doel toegevoegd ✓");} setShowForm(false);setEditGoal(null);setForm({name:"",targetAmount:"",targetDate:"",linkedAccountId:"",monthlyTarget:"",color:T.teal,notes:""});};
  const delGoal = (id) => { onUpdate(d=>({...d,goals:d.goals.filter(g=>g.id!==id)}));toast("Doel verwijderd"); };
  const doQuickUpdate = () => { if(!qAmt)return; onUpdate(d=>({...d,goals:d.goals.map(g=>g.id===quickUpdate?{...g,currentAmount:parseFloat(qAmt)}:g)})); setQuickUpdate(null);setQAmt("");toast("Bedrag bijgewerkt ✓"); };

  const GoalForm = ({init,onSave,onClose}) => { const [f,setF] = useState(init||form); return <Modal title={init?"Doel bewerken":"Spaardoel toevoegen"} onClose={onClose}>
    <FormField label="Naam"><Input placeholder="Bv. Communie Jasper" value={f.name} onChange={e=>setF(x=>({...x,name:e.target.value}))}/></FormField>
    <div className="grid grid-cols-2 gap-4"><FormField label="Doelbedrag (€)"><Input type="number" step="1" min="0" placeholder="5000" value={f.targetAmount} onChange={e=>setF(x=>({...x,targetAmount:e.target.value}))}/></FormField><FormField label="Doeldatum (optioneel)"><Input type="date" value={f.targetDate} onChange={e=>setF(x=>({...x,targetDate:e.target.value}))}/></FormField></div>
    <FormField label="Gekoppelde rekening (optioneel)"><Sel value={f.linkedAccountId} onChange={e=>setF(x=>({...x,linkedAccountId:e.target.value}))}><option value="">Geen — manueel bijhouden</option>{data.accounts.filter(a=>a.active).map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</Sel></FormField>
    <FormField label="Maandelijks streefbedrag (€)"><Input type="number" step="1" min="0" placeholder="100" value={f.monthlyTarget} onChange={e=>setF(x=>({...x,monthlyTarget:e.target.value}))}/></FormField>
    <FormField label="Kleur"><div className="flex gap-2 flex-wrap">{COLORS.map(c=><button key={c} onClick={()=>setF(x=>({...x,color:c}))} className="w-7 h-7 rounded-full border-2 transition-all" style={{backgroundColor:c,borderColor:f.color===c?"#0f2942":"transparent"}}/>)}</div></FormField>
    <FormField label="Notities"><Input placeholder="Optioneel" value={f.notes} onChange={e=>setF(x=>({...x,notes:e.target.value}))}/></FormField>
    <div className="flex gap-3 justify-end mt-2"><Btn variant="secondary" onClick={onClose}>Annuleren</Btn><Btn onClick={()=>onSave(f)} disabled={!f.name||!f.targetAmount}>{init?<><Check size={14}/>Opslaan</>:<><Plus size={14}/>Toevoegen</>}</Btn></div>
  </Modal>; };

  return <div className="p-6 max-w-4xl mx-auto">
    <div className="flex items-center justify-between mb-6"><div><h1 className="text-2xl font-bold text-slate-800">Spaardoelen</h1><p className="text-slate-500 text-sm mt-0.5">Langetermijndoelen — schuldenvrij, grote aankopen, buffers</p></div><Btn onClick={()=>setShowForm(true)} size="md"><Plus size={16}/>Doel toevoegen</Btn></div>
    <div className="grid gap-4">
      {goalsWithProgress.map(g=><Card key={g.id} className="p-5"><div className="flex items-start gap-4">
        <div className="w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style={{backgroundColor:g.color+"22"}}>{g.pct>=100?"✅":"🎯"}</div>
        <div className="flex-1">
          <div className="flex items-center justify-between mb-1"><h3 className="font-semibold text-slate-800">{g.name}</h3>
          <div className="flex gap-1"><button onClick={()=>{setEditGoal(g);}} className="p-1.5 text-slate-300 hover:text-teal-600"><Pencil size={13}/></button><button onClick={()=>delGoal(g.id)} className="p-1.5 text-slate-300 hover:text-red-500"><Trash2 size={13}/></button></div></div>
          {g.notes&&<p className="text-xs text-slate-400 mb-2">{g.notes}</p>}
          <div className="flex items-center justify-between text-sm mb-2"><span className="font-bold" style={{color:g.pct>=100?T.green:g.color}}>{fmtEUR(g.current)}</span><span className="text-slate-400">van {fmtEUR(g.targetAmount)}</span></div>
          <Progress value={g.current} max={g.targetAmount} color={g.color} h={10}/>
          <div className="flex items-center justify-between mt-2 text-xs text-slate-400">
            <span>{g.pct.toFixed(0)}% · nog {fmtEUR(g.remaining)}</span>

              {g.monthlyTarget>0&&<span>€{g.monthlyTarget}/mnd</span>}
              {g.monthsLeft&&<span className="bg-slate-100 px-2 py-0.5 rounded-full">~{g.monthsLeft} maanden</span>}
              {g.targetDate&&<span>📅 {fmtDate(g.targetDate)}</span>}
              {!g.linkedAccountId&&<button onClick={()=>{setQuickUpdate(g.id);setQAmt(g.currentAmount||0);}} className="text-teal-600 hover:text-teal-700 font-medium">Bedrag bijwerken</button>}
            </div>
          </div>
          {quickUpdate===g.id&&<div className="flex items-center gap-2 mt-3 p-3 bg-slate-50 rounded-xl"><Input type="number" step="1" value={qAmt} onChange={e=>setQAmt(e.target.value)} className="flex-1" placeholder="Huidig bedrag"/><Btn size="xs" onClick={doQuickUpdate}><Check size={12}/>OK</Btn><Btn size="xs" variant="secondary" onClick={()=>setQuickUpdate(null)}>✕</Btn></div>}
        </div>
      </div></Card>)}
      {goalsWithProgress.length===0&&<Card className="py-12 text-center"><Target size={32} className="mx-auto text-slate-200 mb-3"/><p className="text-slate-400 text-sm">Nog geen doelen. Voeg je eerste doel toe!</p></Card>}
    </div>
    {showForm&&<GoalForm onSave={saveGoal} onClose={()=>setShowForm(false)}/>}
    {editGoal&&<GoalForm init={{...editGoal,targetAmount:String(editGoal.targetAmount),monthlyTarget:String(editGoal.monthlyTarget||"")}} onSave={g=>saveGoal({...g,id:editGoal.id})} onClose={()=>setEditGoal(null)}/>}
  </div>;
};

// ═══════════ BUDGETTEN ════════════
const BudgettenPage = ({data,onUpdate,toast}) => {
  const [showForm,setShowForm] = useState(false);
  const [form,setForm] = useState({overkoepelend:"",amount:"",period:"monthly"});
  const ovList = useMemo(()=>[...new Set(data.categories.map(c=>c.name))],[data.categories]);

  const budgetsWithSpent = useMemo(()=>data.budgets.map(b=>{
    const year = fmt(today).slice(0,4);
    const relevant = data.transactions.filter(t=>isExpense(t)&&t.overkoepelend===b.overkoepelend&&(b.period==="monthly"?getMonth(t.date)===currentMonth:t.date.startsWith(year)));
    const spent = relevant.reduce((s,t)=>s+t.amount,0);
    const pct = b.amount>0?spent/b.amount*100:0;
    return {...b,spent,pct};
  }),[data.budgets,data.transactions]);

  const totBudget = budgetsWithSpent.reduce((s,b)=>s+b.amount,0);
  const totSpent = budgetsWithSpent.reduce((s,b)=>s+b.spent,0);
  const addBudget = ()=>{ if(!form.overkoepelend||!form.amount)return; onUpdate(d=>({...d,budgets:[...d.budgets,{id:generateId(),...form,amount:parseFloat(form.amount)}]})); setShowForm(false); setForm({overkoepelend:"",amount:"",period:"monthly"}); toast("Budget toegevoegd ✓"); };

  return <div className="p-6 max-w-4xl mx-auto">
    <div className="flex items-center justify-between mb-6"><div><h1 className="text-2xl font-bold text-slate-800">Maandbudgetten</h1><p className="text-slate-500 text-sm mt-0.5">Maximale uitgaven per categorie</p></div><Btn onClick={()=>setShowForm(true)} size="md"><Plus size={16}/>Budget</Btn></div>
    <Card className="p-5 mb-5">
      <div className="flex items-center justify-between mb-3"><div><div className="text-sm text-slate-500">Totaal deze maand</div><div className="text-2xl font-bold text-slate-800 mt-0.5">{fmtEUR(totSpent)} <span className="text-slate-400 text-lg font-normal">/ {fmtEUR(totBudget)}</span></div></div><div className="text-right"><div className="text-sm text-slate-500">Resterend</div><div className={`text-xl font-bold ${totSpent>totBudget?"text-red-500":"text-emerald-600"}`}>{fmtEUR(totBudget-totSpent)}</div></div></div>
      <Progress value={totSpent} max={totBudget} h={10}/>
    </Card>
    <div className="grid gap-3">{budgetsWithSpent.map(b=>{
      const over=b.pct>100; const warn=b.pct>85&&!over;
      return <Card key={b.id} className="p-4">
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-2"><span className="font-medium text-slate-800">{b.overkoepelend}</span><Badge color={b.period==="monthly"?T.blue:T.purple}>{b.period==="monthly"?"Maandelijks":"Jaarlijks"}</Badge>{over&&<Badge color={T.red}>Over budget</Badge>}{warn&&<Badge color={T.amber}>Let op</Badge>}</div>
          <div className="flex items-center gap-3"><span className="text-sm font-semibold" style={{color:over?T.red:warn?T.amber:T.green}}>{fmtEUR(b.spent)}</span><span className="text-xs text-slate-400">/ {fmtEUR(b.amount)}</span><button onClick={()=>{onUpdate(d=>({...d,budgets:d.budgets.filter(x=>x.id!==b.id)}));toast("Budget verwijderd");}} className="text-slate-200 hover:text-red-500"><Trash2 size={13}/></button></div>
        </div>
        <Progress value={b.spent} max={b.amount} h={8}/>
        <div className="text-xs text-slate-400 mt-1">{b.pct.toFixed(0)}% van budget</div>
      </Card>;
    })}
    {budgetsWithSpent.length===0&&<Card className="py-12 text-center"><PiggyBank size={32} className="mx-auto text-slate-200 mb-3"/><p className="text-slate-400 text-sm">Geen budgetten ingesteld.</p></Card>}
    </div>
    {showForm&&<Modal title="Budget toevoegen" onClose={()=>setShowForm(false)}>
      <FormField label="Categorie"><Sel value={form.overkoepelend} onChange={e=>setForm(f=>({...f,overkoepelend:e.target.value}))}><option value="">Kies...</option>{ovList.map(o=><option key={o} value={o}>{o}</option>)}</Sel></FormField>
      <FormField label="Maximumbedrag (€)"><Input type="number" step="1" min="0" placeholder="400" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></FormField>
      <FormField label="Periode"><Sel value={form.period} onChange={e=>setForm(f=>({...f,period:e.target.value}))}><option value="monthly">Maandelijks</option><option value="yearly">Jaarlijks</option></Sel></FormField>
      <div className="flex gap-3 justify-end mt-2"><Btn variant="secondary" onClick={()=>setShowForm(false)}>Annuleren</Btn><Btn onClick={addBudget} disabled={!form.overkoepelend||!form.amount}><Plus size={14}/>Opslaan</Btn></div>
    </Modal>}
  </div>;
};

// ═══════════ ANALYSE ════════════
const AnalysePage = ({data}) => {
  const [period,setPeriod] = useState("month");
  const [drillOv,setDrillOv] = useState(null);
  const txs = useMemo(()=>data.transactions.filter(t=>{
    if(period==="month")return getMonth(t.date)===currentMonth;
    if(period==="year")return t.date.startsWith(fmt(today).slice(0,4));
    return true;
  }).filter(t=>isExpense(t)&&t.hoofdtype!=="Sparen"),[data.transactions,period]);

  const byOv = useMemo(()=>{ const m={}; txs.forEach(t=>{m[t.overkoepelend]=(m[t.overkoepelend]||0)+t.amount;}); return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([name,value])=>({name,value,color:OV_COLORS[name]||"#94a3b8"})); },[txs]);
  const byCat = useMemo(()=>{ if(!drillOv)return []; const m={}; txs.filter(t=>t.overkoepelend===drillOv).forEach(t=>{m[t.category||"Onbekend"]=(m[t.category||"Onbekend"]||0)+t.amount;}); return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([name,value])=>({name,value})); },[txs,drillOv]);
  const total = byOv.reduce((s,e)=>s+e.value,0);
  const COLORS2 = [T.teal,T.amber,"#7C3AED","#2563EB","#059669","#DB2777","#d97706","#64748B"];

  return <div className="p-6 max-w-5xl mx-auto">
    <div className="flex items-center justify-between mb-6">
      <div className="flex items-center gap-3">
        {drillOv&&<button onClick={()=>setDrillOv(null)} className="flex items-center gap-1 text-teal-600 text-sm hover:text-teal-700"><ArrowLeft size={14}/>Terug</button>}
        <h1 className="text-2xl font-bold text-slate-800">{drillOv||"Analyse"}</h1>
      </div>
      <div className="flex gap-2">{[["month","Deze maand"],["year","Dit jaar"],["all","Alles"]].map(([k,l])=>(
        <button key={k} onClick={()=>setPeriod(k)} className={`px-3 py-1.5 rounded-lg text-xs font-medium ${period===k?"bg-teal-600 text-white":"bg-slate-100 text-slate-600 hover:bg-slate-200"}`}>{l}</button>
      ))}</div>
    </div>
    {!drillOv?<div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <Card className="p-5">
        <h2 className="font-semibold text-slate-800 mb-4">Verdeling uitgaven</h2>
        {byOv.length>0?<ResponsiveContainer width="100%" height={200}><PieChart><Pie data={byOv} cx="50%" cy="50%" innerRadius={55} outerRadius={85} paddingAngle={3} dataKey="value">{byOv.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Tooltip formatter={v=>[fmtEUR(v)]} contentStyle={{borderRadius:12,border:"1px solid #e2e8f0"}}/></PieChart></ResponsiveContainer>
        :<div className="py-16 text-center text-slate-400 text-sm">Geen uitgaven in deze periode</div>}
      </Card>
      <Card className="p-5">
        <h2 className="font-semibold text-slate-800 mb-4">Ranglijst <span className="text-xs text-slate-400 font-normal">— klik voor detail</span></h2>
        <div className="space-y-3">{byOv.map((e,i)=><button key={e.name} onClick={()=>setDrillOv(e.name)} className="w-full text-left hover:bg-slate-50 rounded-xl p-2 -mx-2 transition-colors group">
          <div className="flex items-center justify-between text-sm mb-1">
            <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full" style={{backgroundColor:COLORS2[i%COLORS2.length]}}/><span className="font-medium text-slate-700">{e.name}</span></div>
            <div className="flex items-center gap-2"><span className="text-xs text-slate-400">{total>0?(e.value/total*100).toFixed(0):0}%</span><span className="font-semibold">{fmtEUR(e.value)}</span><ChevronRight size={12} className="text-slate-300 group-hover:text-teal-500"/></div>
          </div>
          <Progress value={e.value} max={total} color={COLORS2[i%COLORS2.length]} h={5}/>
        </button>)}
        {byOv.length===0&&<p className="text-slate-400 text-sm text-center py-8">Geen gegevens</p>}
        {total>0&&<div className="mt-4 pt-3 border-t border-slate-100 flex justify-between text-sm font-semibold"><span className="text-slate-600">Totaal</span><span>{fmtEUR(total)}</span></div>}
        </div>
      </Card>
    </div>:<div>
      <div className="grid gap-3">{byCat.map((e,i)=><Card key={e.name} className="p-4"><div className="flex items-center justify-between mb-2"><span className="font-medium text-slate-800">{e.name}</span><span className="font-bold">{fmtEUR(e.value)}</span></div><Progress value={e.value} max={byCat[0]?.value||1} color={COLORS2[i%COLORS2.length]} h={6}/></Card>)}
      {byCat.length===0&&<Card className="py-12 text-center"><p className="text-slate-400 text-sm">Geen transacties voor deze categorie</p></Card>}
      </div>
    </div>}
  </div>;
};

// ═══════════ CATEGORIEËN ════════════
const CategorieeenPage = ({data,onUpdate,toast}) => {
  const [search,setSearch] = useState("");
  const [expanded,setExpanded] = useState({});
  const [showAddOv,setShowAddOv] = useState(false);
  const [showAddCat,setShowAddCat] = useState(null);
  const [showAddItem,setShowAddItem] = useState(null);
  const [ovForm,setOvForm] = useState({name:"",hoofdtype:"Variabele Uitgaven",color:"#0D9488",icon:"📦"});
  const [catForm,setCatForm] = useState({name:""});
  const [itemForm,setItemForm] = useState({name:"",synonyms:"",unit:""});
  const toggle = id=>setExpanded(e=>({...e,[id]:!e[id]}));

  const txCountByOv = useMemo(()=>{ const m={}; data.transactions.forEach(t=>{m[t.overkoepelend]=(m[t.overkoepelend]||0)+1;}); return m; },[data.transactions]);

  const filtered = useMemo(()=>{ if(!search)return data.categories; const q=search.toLowerCase(); return data.categories.map(ov=>{const cats=ov.categories.map(cat=>{const items=cat.items.filter(it=>it.name.toLowerCase().includes(q)||(it.synonyms||[]).some(s=>s.toLowerCase().includes(q)));return{...cat,items:cat.name.toLowerCase().includes(q)?cat.items:items};}).filter(cat=>cat.name.toLowerCase().includes(q)||cat.items.length>0);return{...ov,categories:ov.name.toLowerCase().includes(q)?ov.categories:cats};}).filter(ov=>ov.name.toLowerCase().includes(q)||ov.categories.length>0); },[data.categories,search]);

  const addOv = ()=>{ if(!ovForm.name)return; onUpdate(d=>({...d,categories:[...d.categories,{id:`ov-${generateId()}`,...ovForm,categories:[]}]})); setShowAddOv(false); setOvForm({name:"",hoofdtype:"Variabele Uitgaven",color:"#0D9488",icon:"📦"}); toast("Categorie toegevoegd ✓"); };
  const addCat = ovId=>{ if(!catForm.name)return; onUpdate(d=>({...d,categories:d.categories.map(ov=>ov.id===ovId?{...ov,categories:[...ov.categories,{id:`cat-${generateId()}`,name:catForm.name,items:[]}]}:ov)})); setShowAddCat(null); setCatForm({name:""}); toast("Categorie toegevoegd ✓"); };
  const addItem = (ovId,catId)=>{ if(!itemForm.name)return; const item={id:`i-${generateId()}`,name:itemForm.name,synonyms:itemForm.synonyms.split(",").map(s=>s.trim()).filter(Boolean),unit:itemForm.unit||null}; onUpdate(d=>({...d,categories:d.categories.map(ov=>ov.id===ovId?{...ov,categories:ov.categories.map(cat=>cat.id===catId?{...cat,items:[...cat.items,item]}:cat)}:ov)})); setShowAddItem(null); setItemForm({name:"",synonyms:"",unit:""}); toast("Subcategorie toegevoegd ✓"); };
  const delItem = (ovId,catId,itemId)=>{ onUpdate(d=>({...d,categories:d.categories.map(ov=>ov.id===ovId?{...ov,categories:ov.categories.map(cat=>cat.id===catId?{...cat,items:cat.items.filter(i=>i.id!==itemId)}:cat)}:ov)})); toast("Verwijderd"); };
  const delCat = (ovId,catId)=>{ onUpdate(d=>({...d,categories:d.categories.map(ov=>ov.id===ovId?{...ov,categories:ov.categories.filter(c=>c.id!==catId)}:ov)})); toast("Verwijderd"); };
  const delOv = ovId=>{ onUpdate(d=>({...d,categories:d.categories.filter(ov=>ov.id!==ovId)})); toast("Verwijderd"); };
  const totalItems = data.categories.reduce((s,ov)=>s+ov.categories.reduce((ss,cat)=>ss+cat.items.length,0),0);

  return <div className="p-6 max-w-4xl mx-auto">
    <div className="flex items-center justify-between mb-6"><div><h1 className="text-2xl font-bold text-slate-800">Categorieën</h1><p className="text-slate-500 text-sm mt-0.5">{data.categories.length} hoofdcategorieën · {totalItems} subcategorieën</p></div><Btn onClick={()=>setShowAddOv(true)} size="md"><Plus size={16}/>Hoofdcategorie</Btn></div>
    <div className="relative mb-4"><Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/><Input className="pl-8" placeholder="Zoeken in categorieën en subcategorieën..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
    <div className="space-y-3">{filtered.map(ov=><Card key={ov.id} className="overflow-hidden">
      <button onClick={()=>toggle(ov.id)} className="w-full flex items-center gap-3 p-4 hover:bg-slate-50 text-left">
        <span className="text-xl">{ov.icon}</span>
        <div className="flex-1"><div className="font-semibold text-slate-800">{ov.name}</div><div className="text-xs text-slate-400">{ov.categories.length} cat. · {ov.categories.reduce((s,c)=>s+c.items.length,0)} items{txCountByOv[ov.name]?` · ${txCountByOv[ov.name]} transacties`:""}</div></div>
        <Badge color={ov.color}>{ov.hoofdtype.replace(" Uitgaven","")}</Badge>
        <div className="flex items-center gap-1 ml-2">
          <Btn size="xs" variant="ghost" onClick={e=>{e.stopPropagation();setShowAddCat(ov.id);}}><Plus size={12}/>Cat.</Btn>
          <Btn size="xs" variant="ghost" onClick={e=>{e.stopPropagation();delOv(ov.id);}} className="text-red-400 hover:text-red-600"><Trash2 size={12}/></Btn>
          {expanded[ov.id]?<ChevronDown size={16} className="text-slate-400"/>:<ChevronRight size={16} className="text-slate-400"/>}
        </div>
      </button>
      {expanded[ov.id]&&<div className="border-t border-slate-50">{ov.categories.map(cat=><div key={cat.id} className="border-b border-slate-50 last:border-0">
        <div className="flex items-center gap-2 px-6 py-2.5 bg-slate-50/50">
          <ChevronRight size={12} className="text-slate-300"/>
          <span className="text-sm font-medium text-slate-700 flex-1">{cat.name}</span>
          <span className="text-xs text-slate-400">{cat.items.length} items</span>
          <Btn size="xs" variant="ghost" onClick={()=>setShowAddItem({ovId:ov.id,catId:cat.id})}><Plus size={11}/></Btn>
          <Btn size="xs" variant="ghost" onClick={()=>delCat(ov.id,cat.id)} className="text-red-400"><Trash2 size={11}/></Btn>
        </div>
        <div className="px-8 py-2 flex flex-wrap gap-1.5">{cat.items.map(item=><div key={item.id} className="flex items-center gap-1 bg-white border border-slate-100 rounded-full px-2.5 py-1 text-xs text-slate-600 group">
          {item.name}{item.unit&&<span className="text-slate-300">·{item.unit}</span>}
          <button onClick={()=>delItem(ov.id,cat.id,item.id)} className="ml-1 opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600"><X size={10}/></button>
        </div>)}</div>
      </div>)}</div>}
    </Card>)}</div>
    {showAddOv&&<Modal title="Hoofdcategorie toevoegen" onClose={()=>setShowAddOv(false)}>
      <div className="grid grid-cols-2 gap-4"><FormField label="Naam"><Input placeholder="Bv. Huisdieren" value={ovForm.name} onChange={e=>setOvForm(f=>({...f,name:e.target.value}))}/></FormField><FormField label="Icoon (emoji)"><Input placeholder="🐾" value={ovForm.icon} onChange={e=>setOvForm(f=>({...f,icon:e.target.value}))}/></FormField></div>
      <FormField label="Hoofdtype"><Sel value={ovForm.hoofdtype} onChange={e=>setOvForm(f=>({...f,hoofdtype:e.target.value}))}><option>Variabele Uitgaven</option><option>Vaste Uitgaven</option><option>Sparen</option><option>Inkomsten</option></Sel></FormField>
      <FormField label="Kleur"><Input type="color" value={ovForm.color} className="h-10 px-1" onChange={e=>setOvForm(f=>({...f,color:e.target.value}))}/></FormField>
      <div className="flex gap-3 justify-end mt-2"><Btn variant="secondary" onClick={()=>setShowAddOv(false)}>Annuleren</Btn><Btn onClick={addOv} disabled={!ovForm.name}><Plus size={14}/>Toevoegen</Btn></div>
    </Modal>}
    {showAddCat&&<Modal title="Categorie toevoegen" onClose={()=>setShowAddCat(null)}>
      <FormField label="Naam"><Input placeholder="Bv. Huisdierenverzorging" value={catForm.name} onChange={e=>setCatForm(f=>({...f,name:e.target.value}))}/></FormField>
      <div className="flex gap-3 justify-end mt-2"><Btn variant="secondary" onClick={()=>setShowAddCat(null)}>Annuleren</Btn><Btn onClick={()=>addCat(showAddCat)} disabled={!catForm.name}><Plus size={14}/>Toevoegen</Btn></div>
    </Modal>}
    {showAddItem&&<Modal title="Subcategorie toevoegen" onClose={()=>setShowAddItem(null)}>
      <FormField label="Naam"><Input placeholder="Bv. Hondenvoeding" value={itemForm.name} onChange={e=>setItemForm(f=>({...f,name:e.target.value}))}/></FormField>
      <FormField label="Synoniemen" hint="Komma-gescheiden — bv. 'hondenbrokken, diereneten'"><Input placeholder="synoniem1, synoniem2" value={itemForm.synonyms} onChange={e=>setItemForm(f=>({...f,synonyms:e.target.value}))}/></FormField>
      <FormField label="Standaard eenheid"><Sel value={itemForm.unit} onChange={e=>setItemForm(f=>({...f,unit:e.target.value}))}><option value="">Geen</option>{["stuks","g","kg","ml","L","kWh","m³","m","m²","verpakking"].map(u=><option key={u} value={u}>{u}</option>)}</Sel></FormField>
      <div className="flex gap-3 justify-end mt-2"><Btn variant="secondary" onClick={()=>setShowAddItem(null)}>Annuleren</Btn><Btn onClick={()=>addItem(showAddItem.ovId,showAddItem.catId)} disabled={!itemForm.name}><Plus size={14}/>Toevoegen</Btn></div>
    </Modal>}
  </div>;
};

// ═══════════ INSTELLINGEN ════════════
const InstellingenPage = ({data,onUpdate,onReset,toast}) => {
  const [nameForm,setNameForm] = useState({firstName:data.userProfile?.firstName||"",lastName:data.userProfile?.lastName||""});
  const saveProfile = ()=>{ onUpdate(d=>({...d,userProfile:{...d.userProfile,...nameForm}})); toast("Profiel opgeslagen ✓"); };
  const exportJSON = ()=>{ const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}); const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`financieel-kompas-${fmt(today)}.json`;a.click(); toast("Backup gedownload ✓"); };
  const exportCSV = ()=>{ const h=["Datum","Beschrijving","Merk","Bedrag","Type","Overkoepelend","Categorie","Rekening"]; const rows=data.transactions.map(t=>[t.date,t.description,t.brand||"",isExpense(t)?-t.amount:t.amount,t.hoofdtype,t.overkoepelend||"",t.category||"",data.accounts.find(a=>a.id===t.accountId)?.name||""]); const csv=[h,...rows].map(r=>r.join(";")).join("\n"); const b=new Blob([csv],{type:"text/csv;charset=utf-8"}); const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`transacties-${fmt(today)}.csv`;a.click(); toast("CSV geëxporteerd ✓"); };
  const importJSON = e=>{ const file=e.target.files[0];if(!file)return; const r=new FileReader(); r.onload=ev=>{try{const d=JSON.parse(ev.target.result);onUpdate(()=>d);toast("Data geïmporteerd ✓");}catch{toast("Ongeldig bestand","error");}}; r.readAsText(file); };

  return <div className="p-6 max-w-2xl mx-auto">
    <h1 className="text-2xl font-bold text-slate-800 mb-6">Instellingen</h1>
    <div className="space-y-4">
      <Card className="p-5"><div className="flex items-center gap-3 mb-4"><div className="w-9 h-9 rounded-xl flex items-center justify-center" style={{backgroundColor:T.tealBg}}>👤</div><div><h2 className="font-semibold text-slate-800">Mijn profiel</h2><p className="text-xs text-slate-400">Naam die getoond wordt in de app</p></div></div>
        <div className="grid grid-cols-2 gap-4"><FormField label="Voornaam"><Input value={nameForm.firstName} onChange={e=>setNameForm(f=>({...f,firstName:e.target.value}))}/></FormField><FormField label="Achternaam"><Input value={nameForm.lastName} onChange={e=>setNameForm(f=>({...f,lastName:e.target.value}))}/></FormField></div>
        <Btn onClick={saveProfile}><Check size={14}/>Opslaan</Btn>
      </Card>
      <Card className="p-5"><div className="flex items-center gap-3 mb-4"><div className="w-9 h-9 rounded-xl flex items-center justify-center" style={{backgroundColor:T.tealBg}}>☁️</div><div><h2 className="font-semibold text-slate-800">Google Drive Sync</h2><p className="text-xs text-slate-400">Koppel je account voor sync over alle toestellen</p></div></div>
        <div className="p-4 rounded-xl border-2 border-dashed border-slate-200 text-center"><p className="text-sm text-slate-500 mb-3">Nog niet verbonden — vereist eenmalige Google Cloud setup.<br/>Handleiding volgt in de volgende stap.</p><Btn variant="secondary" size="sm">📘 Setup-handleiding</Btn></div>
      </Card>
      <Card className="p-5"><div className="flex items-center gap-3 mb-4"><div className="w-9 h-9 rounded-xl flex items-center justify-center" style={{backgroundColor:"#eff6ff"}}>💾</div><div><h2 className="font-semibold text-slate-800">Export & Backup</h2></div></div>
        <div className="grid grid-cols-2 gap-3">
          <button onClick={exportJSON} className="flex items-center justify-center gap-2 p-4 rounded-xl border-2 border-slate-100 hover:border-teal-200 hover:bg-teal-50 transition-all text-sm font-medium text-slate-700"><Download size={16} className="text-teal-600"/>JSON Backup</button>
          <button onClick={exportCSV} className="flex items-center justify-center gap-2 p-4 rounded-xl border-2 border-slate-100 hover:border-amber-200 hover:bg-amber-50 transition-all text-sm font-medium text-slate-700"><Download size={16} className="text-amber-600"/>CSV (Excel)</button>
        </div>
      </Card>
      <Card className="p-5"><div className="flex items-center gap-3 mb-4"><div className="w-9 h-9 rounded-xl flex items-center justify-center" style={{backgroundColor:"#ecfdf5"}}>📂</div><div><h2 className="font-semibold text-slate-800">Importeren</h2></div></div>
        <label className="flex items-center justify-center gap-2 p-4 rounded-xl border-2 border-dashed border-slate-200 hover:border-teal-300 cursor-pointer transition-colors"><Upload size={16} className="text-slate-400"/><span className="text-sm text-slate-500">Klik om JSON-backup te importeren</span><input type="file" accept=".json" className="hidden" onChange={importJSON}/></label>
      </Card>
      <Card className="p-5"><h2 className="font-semibold text-slate-800 mb-3">Overzicht data</h2>
        <div className="grid grid-cols-2 gap-3">{[["Transacties",data.transactions.length],["Rekeningen",data.accounts.length],["Spaardoelen",data.goals.length],["Budgetten",data.budgets.length],["Categorieën",data.categories.length],["Subcategorieën",data.categories.reduce((s,o)=>s+o.categories.reduce((ss,c)=>ss+c.items.length,0),0)]].map(([k,v])=><div key={k} className="bg-slate-50 rounded-xl p-3"><div className="text-xs text-slate-400">{k}</div><div className="font-semibold text-slate-800 mt-0.5">{v}</div></div>)}</div>
        <button onClick={()=>{onReset();toast("Voorbeelddata hersteld");}} className="mt-4 text-xs text-slate-400 hover:text-slate-600 underline">Voorbeelddata herstellen</button>
      </Card>
    </div>
  </div>;
};

// ═══════════ MAIN APP ════════════
function App({ data, onUpdate }) {
  const [page,setPage] = useState("dashboard");
  const [sidebarOpen,setSidebarOpen] = useState(true);
  const [showTxForm,setShowTxForm] = useState(false);
  const [toasts,setToasts] = useState([]);


  const addToast = useCallback((msg,type="success")=>{ const id=generateId(); setToasts(t=>[...t,{id,msg,type}]); setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000); },[]);
  const update = onUpdate;
  const addTx = useCallback(tx=>update(d=>({...d,transactions:[tx,...d.transactions]})),[update]);
  const updateTx = useCallback(tx=>update(d=>({...d,transactions:d.transactions.map(t=>t.id===tx.id?tx:t)})),[update]);
  const deleteTx = useCallback(id=>update(d=>({...d,transactions:d.transactions.filter(t=>t.id!==id)})),[update]);

  return <div className="flex h-screen overflow-hidden" style={{backgroundColor:T.slate50,fontFamily:"Inter,system-ui,sans-serif"}}>
    <Sidebar current={page} onNav={setPage} open={sidebarOpen} onToggle={()=>setSidebarOpen(s=>!s)} profile={data.userProfile}/>
    <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
      <div className="flex items-center gap-3 px-4 py-3 bg-white border-b border-slate-100 flex-shrink-0">
        <button onClick={()=>setSidebarOpen(s=>!s)} className="p-2 rounded-lg hover:bg-slate-100 text-slate-500"><Menu size={18}/></button>
        <div className="flex-1"/>
        <Btn size="sm" onClick={()=>setShowTxForm(true)}><Plus size={14}/>Transactie</Btn>
        <button className="p-2 rounded-lg hover:bg-slate-100 text-slate-500 relative"><Bell size={18}/>{data.budgets.some(b=>{ const spent=data.transactions.filter(t=>isExpense(t)&&t.overkoepelend===b.overkoepelend&&getMonth(t.date)===currentMonth).reduce((s,t)=>s+t.amount,0); return b.amount>0&&spent/b.amount>0.85; })&&<span className="absolute top-1.5 right-1.5 w-2 h-2 bg-amber-400 rounded-full"/>}</button>
      </div>
      <main className="flex-1 overflow-y-auto">
        {page==="dashboard"    &&<Dashboard data={data} onQuickAdd={()=>setShowTxForm(true)} profile={data.userProfile}/>}
        {page==="transacties"  &&<TransactiesPage data={data} onAdd={tx=>{addTx(tx);}} onUpdate={tx=>{updateTx(tx);}} onDelete={deleteTx} toast={addToast}/>}
        {page==="rekeningen"   &&<RekeningenPage data={data} onUpdate={update} toast={addToast}/>}
        {page==="spaardoelen"  &&<SpaardoelenPage data={data} onUpdate={update} toast={addToast}/>}
        {page==="budgetten"    &&<BudgettenPage data={data} onUpdate={update} toast={addToast}/>}
        {page==="analyse"      &&<AnalysePage data={data}/>}
        {page==="categorieen"  &&<CategorieeenPage data={data} onUpdate={update} toast={addToast}/>}
        {page==="instellingen" &&<InstellingenPage data={data} onUpdate={update} onReset={()=>update(()=>SAMPLE_DATA)} toast={addToast}/>}
      </main>
    </div>
    {showTxForm&&<TxForm data={data} onSave={tx=>{addTx(tx);addToast("Transactie opgeslagen ✓");setShowTxForm(false);}} onClose={()=>setShowTxForm(false)}/>}
    <Toast toasts={toasts}/>
  </div>;
}



function LoginScreen({ onSignIn, clientIdMissing }) {
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",backgroundColor:"#0F2942"}}>
      <div style={{background:"white",borderRadius:"24px",boxShadow:"0 25px 50px rgba(0,0,0,0.4)",padding:"32px",maxWidth:"360px",width:"100%",textAlign:"center"}}>
        <div style={{width:64,height:64,borderRadius:16,backgroundColor:"#F59E0B",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 20px"}}>💎</div>
        <h1 style={{fontSize:24,fontWeight:700,color:"#1e293b",margin:"0 0 4px"}}>Financieel Kompas</h1>
        <p style={{color:"#94a3b8",fontSize:14,margin:"0 0 32px"}}>Jouw persoonlijke budgetplanner</p>
        {clientIdMissing
          ? <div style={{padding:16,background:"#fffbeb",borderRadius:12,fontSize:14,color:"#92400e",textAlign:"left"}}>
              <strong>⚙️ Setup nodig:</strong><br/>Voeg je Google Client ID toe in de HTML (zie de handleiding, stap 6).
            </div>
          : <>
              <button onClick={onSignIn} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:12,padding:"12px 24px",borderRadius:12,fontWeight:600,color:"#374151",border:"2px solid #e2e8f0",background:"white",cursor:"pointer",fontSize:15,marginBottom:16}}>
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Aanmelden met Google
              </button>
              <p style={{fontSize:12,color:"#94a3b8"}}>Je data wordt opgeslagen in jouw Google Drive.<br/>Niemand anders heeft er toegang toe.</p>
            </>
        }
      </div>
    </div>
  );
}

function Root() {
  const [driveState, setDriveState] = useState('init');
  const [data, setData] = useState(null);
  const saveTimer = useRef(null);
  const clientIdMissing = !GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID';

  useEffect(() => {
    if (clientIdMissing) {
      setDriveState('login');
      return;
    }
    _onDriveReady = () => setDriveState('login');
    window._driveAuthenticated = async () => {
      setDriveState('loading');
      try {
        const loaded = await driveLoad();
        setData(loaded && loaded.transactions ? loaded : SAMPLE_DATA);
        setDriveState('ready');
      } catch(e) {
        console.error('Drive load error:', e);
        setDriveState('error');
      }
    };
    window._driveError = (err) => { console.error('Drive auth error:', err); setDriveState('error'); };
    if (_gapiReady && _gisReady) setDriveState('login');
  }, []);

  const update = useCallback((fn) => {
    setData(d => {
      const next = typeof fn === 'function' ? fn(d) : fn;
      if (!clientIdMissing) {
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => driveSave(next).catch(e => console.error('Drive save error:', e)), 2000);
      }
      return next;
    });
  }, [clientIdMissing]);

  const navy = "#0F2942";
  if (driveState === 'init') return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",backgroundColor:navy}}>
      <div style={{color:"white",textAlign:"center"}}><div style={{fontSize:48,marginBottom:16}}>💎</div><div style={{fontSize:16,opacity:0.7}}>Laden...</div></div>
    </div>
  );
  if (driveState === 'login') return <LoginScreen onSignIn={driveSignIn} clientIdMissing={clientIdMissing}/>;
  if (driveState === 'loading') return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",backgroundColor:navy}}>
      <div style={{color:"white",textAlign:"center"}}><div style={{fontSize:48,marginBottom:16}}>💎</div><div style={{fontWeight:600}}>Data laden uit Google Drive...</div></div>
    </div>
  );
  if (driveState === 'error') return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,backgroundColor:navy}}>
      <div style={{background:"white",borderRadius:16,padding:24,textAlign:"center",maxWidth:320}}>
        <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
        <p style={{color:"#475569",marginBottom:16}}>Verbinding mislukt. Controleer je internet en probeer opnieuw.</p>
        <button onClick={()=>setDriveState('login')} style={{padding:"8px 20px",background:"#0D9488",color:"white",border:"none",borderRadius:8,fontWeight:600,cursor:"pointer"}}>Opnieuw proberen</button>
      </div>
    </div>
  );

  return <App data={data} onUpdate={update}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);

  </script>
</body>
